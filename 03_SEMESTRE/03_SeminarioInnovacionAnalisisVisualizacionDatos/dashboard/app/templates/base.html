<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo 1C - UNIR - Analisis de datos y visualización</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- BLOQUE VISTA (Paso 3): Librería Plotly JS -->
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <!-- Librería html2pdf para generación de PDF del dashboard -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"
        integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: '#3b82f6',
                    }
                }
            }
        }
    </script>
    <script>
        // Check local storage for theme preference immediately to prevent flash of incorrect theme
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
</head>

<body
    class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen font-sans antialiased transition-colors duration-300">
    <!-- Navbar -->
    <nav
        class="bg-white/90 dark:bg-slate-800/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-700 p-4 sticky top-0 z-50 shadow-sm transition-colors duration-300">
        <div class="container mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div
                    class="w-8 h-8 rounded-lg bg-gradient-to-tr from-blue-500 to-teal-400 flex items-center justify-center shadow-lg">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z">
                        </path>
                    </svg>
                </div>
                <a href="{{ url_for('main.index') }}" class="hover:opacity-80 transition-opacity">
                    <h1
                        class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-teal-300">
                        Monitor de Vulnerabilidad Educativa y Abandono Escolar en Primaria (2021-2024)
                    </h1>
                </a>
            </div>
            <div class="hidden sm:flex items-center space-x-4 text-sm font-medium text-slate-600 dark:text-slate-300">
                <a href="{{ url_for('main.fuentes') }}"
                    class="hover:text-slate-900 dark:hover:text-white transition-colors duration-200">Fuentes de
                    Datos</a>
                <a href="#" id="download-pdf-btn"
                    class="hover:text-slate-900 dark:hover:text-white transition-colors duration-200 cursor-pointer">Descargar
                    PDF</a>
                <a href="{{ url_for('main.nosotros') }}"
                    class="hover:text-brand dark:hover:text-brand transition-colors duration-200">Nosotros</a>
                <!-- Botón de Tema Cambiar -->
                <button id="theme-toggle"
                    class="p-2 ml-4 rounded-lg bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 transition-colors duration-200"
                    aria-label="Toggle Dark Mode">
                    <!-- Icono Sol (Modo Oscuro -> Claro) -->
                    <svg id="theme-toggle-light-icon" class="hidden w-5 h-5 text-yellow-500" fill="currentColor"
                        viewBox="0 0 20 20">
                        <path
                            d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z">
                        </path>
                    </svg>
                    <!-- Icono Luna (Modo Claro -> Oscuro) -->
                    <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5 text-slate-700 dark:text-slate-200"
                        fill="currentColor" viewBox="0 0 20 20">
                        <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container mx-auto p-4 md:p-6 lg:p-8 mt-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer
        class="mt-12 py-6 text-center text-slate-500 dark:text-slate-400 text-sm border-t border-slate-200 dark:border-slate-800 transition-colors duration-300">
        &copy; 2026 Data Intelligence. Construido con Flask & Tailwind CSS.
    </footer>
</body>

</html>
