<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">

    <div
        class="bg-white dark:bg-slate-800/60 backdrop-blur border border-slate-200 dark:border-slate-700 p-5 rounded-2xl shadow-sm transition-colors duration-300">
        <h3
            class="text-slate-500 dark:text-slate-400 text-xs font-semibold uppercase tracking-wider mb-2 transition-colors duration-300">
            Abandono Primaria</h3>
        <p class="text-3xl font-bold text-slate-900 dark:text-white transition-colors duration-300">{{ kpi_abandono }}%
        </p>
    </div>

    <div
        class="backdrop-blur border p-5 rounded-2xl shadow-sm transition-colors duration-300
                    {% if kpi_salud > 50 %} bg-red-50 dark:bg-red-900/40 border-red-300 dark:border-red-500 {% else %} bg-white dark:bg-slate-800/60 border-slate-200 dark:border-slate-700 {% endif %}">
        <h3
            class="text-xs font-semibold uppercase tracking-wider mb-2 transition-colors duration-300
                       {% if kpi_salud > 50 %} text-red-600 dark:text-red-300 {% else %} text-slate-500 dark:text-slate-400 {% endif %}">
            Carencia Salud
        </h3>
        <p
            class="text-3xl font-bold transition-colors duration-300 {% if kpi_salud > 50 %} text-red-600 dark:text-red-400 {% else %} text-slate-900 dark:text-white {% endif %}">
            {{ kpi_salud }}%
        </p>
        {% if kpi_salud > 50 %}
        <p class="text-xs mt-2 text-red-600 dark:text-red-400 font-medium transition-colors duration-300">⚠️ ¡Alerta:
            Alto riesgo de abandono escolar!</p>
        {% endif %}
    </div>


    <div
        class="bg-white dark:bg-slate-800/60 backdrop-blur border border-slate-200 dark:border-slate-700 p-5 rounded-2xl shadow-sm transition-colors duration-300">
        <h3
            class="text-slate-500 dark:text-slate-400 text-xs font-semibold uppercase tracking-wider mb-2 transition-colors duration-300">
            Razón Ingreso (Índice)</h3>
        <p class="text-3xl font-bold text-slate-900 dark:text-white transition-colors duration-300">{{ kpi_ingreso }}
        </p>
    </div>


    <div
        class="bg-white dark:bg-slate-800/60 backdrop-blur border border-slate-200 dark:border-slate-700 p-5 rounded-2xl shadow-sm transition-colors duration-300">
        <h3
            class="text-slate-500 dark:text-slate-400 text-xs font-semibold uppercase tracking-wider mb-2 transition-colors duration-300">
            Vivienda Piso Tierra</h3>
        <p class="text-3xl font-bold text-slate-900 dark:text-white transition-colors duration-300">{{ kpi_vivienda }}%
        </p>
    </div>

</div>
