<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">

    <div class="bg-slate-800/60 backdrop-blur border border-slate-700 p-5 rounded-2xl shadow-sm">
        <h3 class="text-slate-400 text-xs font-semibold uppercase tracking-wider mb-2">Abandono Primaria</h3>
        <p class="text-3xl font-bold text-white">{{ kpi_abandono }}%</p>
    </div>

    <div
        class="backdrop-blur border p-5 rounded-2xl shadow-sm transition-colors 
                    {% if kpi_salud > 50 %} bg-red-900/40 border-red-500 {% else %} bg-slate-800/60 border-slate-700 {% endif %}">
        <h3 class="text-xs font-semibold uppercase tracking-wider mb-2 
                       {% if kpi_salud > 50 %} text-red-300 {% else %} text-slate-400 {% endif %}">
            Carencia Salud
        </h3>
        <p class="text-3xl font-bold {% if kpi_salud > 50 %} text-red-400 {% else %} text-white {% endif %}">
            {{ kpi_salud }}%
        </p>
        {% if kpi_salud > 50 %}
        <p class="text-xs mt-2 text-red-400 font-medium">⚠️ ¡Alerta: Alto riesgo de abandono escolar!</p>
        {% endif %}
    </div>


    <div class="bg-slate-800/60 backdrop-blur border border-slate-700 p-5 rounded-2xl shadow-sm">
        <h3 class="text-slate-400 text-xs font-semibold uppercase tracking-wider mb-2">Razón Ingreso (Índice)</h3>
        <p class="text-3xl font-bold text-white">{{ kpi_ingreso }}</p>
    </div>


    <div class="bg-slate-800/60 backdrop-blur border border-slate-700 p-5 rounded-2xl shadow-sm">
        <h3 class="text-slate-400 text-xs font-semibold uppercase tracking-wider mb-2">Vivienda Piso Tierra</h3>
        <p class="text-3xl font-bold text-white">{{ kpi_vivienda }}%</p>
    </div>

</div>
